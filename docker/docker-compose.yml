services:
  reqradar:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-large-zh}
    image: reqradar:latest
    ports:
      - "${REQRADAR_PORT:-8000}:8000"
    volumes:
      - reqradar_data:/app/.reqradar
      - reqradar_db:/app/data
      - model_cache:/home/appuser/.cache
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - REQRADAR_SECRET_KEY=${REQRADAR_SECRET_KEY:-change-me-in-production}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - REQRADAR_LOG_LEVEL=${REQRADAR_LOG_LEVEL:-INFO}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start-period: 60s
      retries: 3

volumes:
  reqradar_data:
  reqradar_db:
  model_cache: