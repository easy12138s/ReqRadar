version: '3.8'

services:
  reqradar:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: reqradar
    ports:
      - "8000:8000"
    volumes:
      - reqradar_data:/app/data
      - reqradar_dotfiles:/app/.reqradar
    environment:
      - REQRADAR_SECRET_KEY=${REQRADAR_SECRET_KEY:-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - reqradar_net

volumes:
  reqradar_data:
    driver: local
  reqradar_dotfiles:
    driver: local

networks:
  reqradar_net:
    driver: bridge
