<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- 外圈 -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.6"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="32" cy="32" r="12" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.3"/>
  <circle cx="32" cy="32" r="4" fill="url(#g)" opacity="0.8"/>
  <!-- 十字准线 -->
  <line x1="32" y1="4" x2="32" y2="32" stroke="url(#g)" stroke-width="1" opacity="0.3"/>
  <line x1="32" y1="32" x2="60" y2="32" stroke="url(#g)" stroke-width="1" opacity="0.15"/>
  <!-- 扫描线 -->
  <line x1="32" y1="32" x2="56" y2="14" stroke="url(#g)" stroke-width="2" opacity="0.9"/>
  <circle cx="56" cy="14" r="2.5" fill="#00d4ff"/>
